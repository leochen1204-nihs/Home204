<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>鐵捲門雲控制</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      background-color: #f2f2f7; /* iOS 風格背景 */
      margin: 0;
      padding: 0 10px 40px;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      justify-content: space-between;
    }

    h1 {
      margin-top: 30px;
      font-size: 1.6rem;
      color: #333;
    }

    /* 共用卡片樣式 (Login & FaceID 鎖) */
    .auth-card {
      max-width: 400px;
      margin: 60px auto 20px;
      background: white;
      padding: 30px 20px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    
    .auth-card input {
      width: 100%;
      padding: 12px 15px;
      margin: 10px 0 20px;
      font-size: 1rem;
      border: 1.5px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
      transition: border-color 0.3s ease;
    }
    .auth-card input:focus { border-color: #1e88e5; outline: none; }
    
    .auth-card button {
      width: 100%;
      background-color: #1e88e5;
      color: white;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    .auth-card button:active { background-color: #1565c0; transform: scale(0.98); }

    /* 各區塊預設隱藏 */
    #loginForm, #biometricLock, #dashboard { display: none; }

    /* Face ID 特殊按鈕 */
    #faceIdBtn { background-color: #333; margin-top: 15px; }
    #faceIdBtn:active { background-color: #000; }

    /* Dashboard */
    .relay-container {
      max-width: 960px;
      margin: 20px auto 0;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .relay-card {
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 26px;
      font-weight: bold;
      padding: 40px 10px;
      margin: 15px;
      border-radius: 15px;
      width: 180px;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 6px 0 rgba(0,0,0,0.2);
      transition: all 0.15s ease;
    }

    .relay-card.up { background-color: #34c759; }    /* iOS 綠 */
    .relay-card.stop { background-color: #ff3b30; }  /* iOS 紅 */
    .relay-card.down { background-color: #007aff; }  /* iOS 藍 */

    /* 按下動畫 */
    .relay-card.pressed {
      transform: translateY(4px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.3);
    }
    .relay-card.up.pressed { background-color: #248a3d; }
    .relay-card.stop.pressed { background-color: #b3241c; }
    .relay-card.down.pressed { background-color: #0056b3; }

    #logoutBtn {
      background-color: transparent;
      color: #ff3b30;
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 16px;
      font-weight: bold;
      border: 2px solid #ff3b30;
      border-radius: 10px;
      cursor: pointer;
    }

    @media (max-width: 700px) {
      .relay-card { width: 90%; margin: 10px auto; }
    }

    footer { font-size: 0.9rem; color: #999; padding: 10px 0; margin-top: 40px; }
  </style>
</head>

<body>

  <h1>Home204 鐵捲門</h1>

  <div id="loginForm" class="auth-card">
    <h3>帳號登入</h3>
    <input type="email" id="email" placeholder="Enter Email" value="home214@gmail.com" required />
    <input type="password" id="password" placeholder="Enter Password" required />
    <button id="loginBtn">登入系統</button>
  </div>

  <div id="biometricLock" class="auth-card">
    <h3 style="font-size: 40px; margin: 10px 0;">🔒</h3>
    <h3>系統已鎖定</h3>
    <p style="color: #666; font-size: 14px;">您的登入狀態已保存，請解鎖以控制鐵捲門。</p>
    <button id="faceIdBtn">使用 Face ID / 指紋解鎖</button>
    
    <div style="margin-top: 20px;">
        <a href="#" id="forceLogoutBtn" style="color: #888; font-size: 14px; text-decoration: underline;">切換帳號 (登出)</a>
    </div>
  </div>

  <div id="dashboard">
    <div class="relay-container">
      <div class="relay-card up" data-id="1">⇧ UP</div>
      <div class="relay-card stop" data-id="2">■ STOP</div>
      <div class="relay-card down" data-id="3">⇩ DOWN</div>
    </div>
    <button id="logoutBtn">登出系統</button>
  </div>

  <footer>Created by LeoChen</footer>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script>
    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyCjdDG7XRhJhRjhbFbrLkrW8-yDMc9vFKs",
      authDomain: "esp32-autohome204.firebaseapp.com",
      databaseURL: "https://esp32-autohome204-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "esp32-autohome204",
      storageBucket: "esp32-autohome204.firebasestorage.app",
      messagingSenderId: "835599613325",
      appId: "1:835599613325:web:b6c11c3a598b1f07a6d1c4"
    };
    firebase.initializeApp(firebaseConfig);

    // DOM Elements
    const loginForm = document.getElementById("loginForm");
    const biometricLock = document.getElementById("biometricLock");
    const dashboard = document.getElementById("dashboard");
    let isControlInitialized = false;

    // --- 登入狀態監聽 ---
    firebase.auth().onAuthStateChanged(user => {
      if (user) {
        // 已登入 Firebase：隱藏密碼登入，顯示 FaceID 鎖定畫面
        loginForm.style.display = "none";
        
        if (window.PublicKeyCredential) {
            biometricLock.style.display = "block";
            dashboard.style.display = "none";
        } else {
            // 如果設備不支援生物辨識，直接進入控制面板
            showDashboard(); 
        }
      } else {
        // 未登入 Firebase：顯示密碼登入
        loginForm.style.display = "block";
        biometricLock.style.display = "none";
        dashboard.style.display = "none";
      }
    });

    // --- Email 密碼登入 ---
    document.getElementById("loginBtn").addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) return alert("請輸入 Email 與密碼");

      firebase.auth().signInWithEmailAndPassword(email, password)
        .catch(error => alert("登入失敗: " + error.message));
    });

    // --- Face ID / 指紋解鎖 ---
    document.getElementById("faceIdBtn").addEventListener("click", async () => {
        try {
            const challenge = new Uint8Array(32); window.crypto.getRandomValues(challenge);
            const userId = new Uint8Array(16); window.crypto.getRandomValues(userId);

            const options = {
                publicKey: {
                    challenge: challenge,
                    rp: { name: "Home204 Control", id: window.location.hostname },
                    user: { id: userId, name: "owner", displayName: "管理員" },
                    pubKeyCredParams: [{ alg: -7, type: "public-key" }],
                    authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
                    timeout: 60000
                }
            };

            const credential = await navigator.credentials.create(options);
            if (credential) {
                // 解鎖成功！
                biometricLock.style.display = "none";
                showDashboard();
            }
        } catch (err) {
            console.error(err);
            // 忽略使用者主動取消的錯誤，其他錯誤才跳出提示
            if (err.name !== 'NotAllowedError') {
                alert("驗證錯誤: " + err.message);
            }
        }
    });

    // --- 顯示控制面板與綁定事件 ---
    function showDashboard() {
        dashboard.style.display = "block";
        
        if (!isControlInitialized) {
            const db = firebase.database();
            const cards = document.querySelectorAll(".relay-card");

            cards.forEach(card => {
                const id = card.getAttribute("data-id");
                
                card.addEventListener("click", () => {
                    db.ref(`triggerRelay${id}`).set(Date.now());
                });

                // 動畫效果
                card.addEventListener("pointerdown", () => card.classList.add("pressed"));
                card.addEventListener("pointerup", () => card.classList.remove("pressed"));
                card.addEventListener("pointerleave", () => card.classList.remove("pressed"));
            });
            isControlInitialized = true;
        }
    }

    // --- 登出處理 ---
    const doLogout = () => {
      firebase.auth().signOut().then(() => {
        document.getElementById("password").value = "";
      });
    };
    document.getElementById("logoutBtn").onclick = doLogout;
    document.getElementById("forceLogoutBtn").onclick = doLogout;

  </script>
</body>
</html>
